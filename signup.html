<head>

   <meta name="keywords" content="love running, running club, runners, Ireland, Dublin, sport, excercise ">

  <!-- Title -->
  <title>Love Running</title>
  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">


  <!-- stylesheet -->
   <link rel="stylesheet" href="assets/CSS/style.css">

<body>
  <!-- Header -->
  <header>
    <a href="index.html">
      <h1 id="logo">Love Running</h1>
    </a>
    <input type="checkbox" id="nav-toggle" name="nav-toggle">
    <label for="nav-toggle" class="nav-toggle-label"><i class="fa-solid fa-bars"></i></label>
    <nav>
      <ul id="menu">
        <li><a href="index.html" >Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="signup.html" class="active">Sign Up</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <section id="signup">
   
    <form action="POST" action="https://formdump.codeinstitute.net" id="signup-form">
       <h2><i class="fa-solid fa-heart-pulse"></i> LET'S GET YOU SIGNED UP!</h2>
      <label for="first-name">First Name: </label>
      <input type="text" id="first-name" name="first_name" class="text-input" required><br>

      <label for="last-name" name="last_name">Last Name:</label>
      <input type="text" id="last-name" name="last_name" class="text-input" required><br>

      <label for="email-address">Email Address: </label>
      <input type="email" id="email-address" name="email_address" class="text-input" required><br>

   <div class="radio-buttons">

      <div>
      <label for="road">Road</label>
      <input type="radio" id="road" name="running_preference" value="road" required checked>
    </div>

    <div>
      <label for="trail">Trail</label>
      <input type="radio" id="trail" name="running_preference" value="trail" required>
    </div>

    <div>
      <label for="both">Both</label>
      <input type="radio" id="both" name="running_preference" value="both">
    </div>
</div>
<input type="submit" class="join-button" value="Let's Run!">
    </form>
</section>
  </main>
<!-- Footer -->
